<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Space — Jackson's CBT Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --bg2: #edeae3;
    --bg3: #e0dbd2;
    --surface: #faf8f5;
    --text: #1c1a17;
    --text2: #5a5650;
    --text3: #9a948c;
    --accent: #4a6b5a;
    --accent-hover: #3a5a49;
    --coral: #c4634a;
    --amber: #c49a3a;
    --teal: #5b8c7a;
    --border: rgba(28,26,23,0.1);
    --shadow: 0 2px 20px rgba(28,26,23,0.07);
  }

  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: stretch; }

  #app { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 230px; min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .app-name { font-family: 'Lora', serif; font-size: 18px; color: var(--text); font-weight: 500; letter-spacing: -0.01em; }
  .app-sub { font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }

  .sidebar-section {
    padding: 18px 20px 6px;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3);
  }

  .bot-btn {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 20px; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
    transition: background 0.15s; border-left: 2px solid transparent;
  }
  .bot-btn:hover { background: var(--bg2); }
  .bot-btn.active { background: var(--bg2); border-left-color: var(--accent); }
  .bot-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .bot-btn-text { display: flex; flex-direction: column; gap: 1px; }
  .bot-btn-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .bot-btn-role { font-size: 11px; color: var(--text3); }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .mood-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .mood-strip { display: flex; gap: 6px; }
  .mood-btn {
    flex: 1; padding: 6px 0; border: 1px solid var(--border);
    border-radius: 7px; background: var(--bg2); cursor: pointer;
    font-size: 15px; text-align: center; transition: all 0.15s;
    line-height: 1;
  }
  .mood-btn:hover { background: var(--bg3); transform: scale(1.08); }
  .mood-btn.selected { border-color: var(--accent); background: rgba(74,107,90,0.12); }

  /* ── MAIN CHAT ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  #chat-header {
    padding: 15px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 11px;
    flex-shrink: 0;
  }
  .header-dot { width: 10px; height: 10px; border-radius: 50%; transition: background 0.3s; }
  .header-name { font-family: 'Lora', serif; font-size: 17px; font-weight: 500; }
  .header-desc { font-size: 12px; color: var(--text3); margin-left: 2px; }
  .mode-badge {
    margin-left: auto;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 11px; border-radius: 20px;
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .mode-badge.therapist { background: rgba(74,107,90,0.12); color: var(--accent); border-color: rgba(74,107,90,0.25); }
  .mode-badge.support   { background: rgba(196,99,74,0.1);  color: var(--coral); border-color: rgba(196,99,74,0.25); }
  .mode-badge.friend    { background: rgba(196,154,58,0.12); color: var(--amber); border-color: rgba(196,154,58,0.25); }

  #messages {
    flex: 1; overflow-y: auto; padding: 28px 24px;
    display: flex; flex-direction: column; gap: 18px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg { display: flex; gap: 11px; max-width: 74%; animation: fadeUp 0.22s ease; }
  .msg.user      { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 33px; height: 33px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: white; letter-spacing: 0;
  }
  .msg-bubble {
    padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.7; color: var(--text);
  }
  .msg.user      .msg-bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .typing-wrap { display: flex; align-items: center; gap: 11px; align-self: flex-start; animation: fadeUp 0.2s ease; }
  .typing-bubble { padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; display: flex; gap: 5px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.3s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .mode-check-wrap {
    align-self: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px;
    max-width: 400px; text-align: center;
    animation: fadeUp 0.22s ease;
  }
  .mode-check-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .mode-check-btns { display: flex; gap: 8px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
  .mode-check-btn {
    padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg2); cursor: pointer; font-size: 12px;
    font-family: 'DM Sans', sans-serif; color: var(--text2);
    transition: all 0.15s; font-weight: 500;
  }
  .mode-check-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--text3); }

  .welcome-wrap {
    align-self: center; text-align: center;
    padding: 40px 28px; max-width: 420px;
    animation: fadeUp 0.3s ease;
  }
  .welcome-wrap h2 { font-family: 'Lora', serif; font-size: 26px; font-weight: 500; margin-bottom: 10px; color: var(--text); }
  .welcome-wrap p { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .welcome-starters { display: flex; flex-direction: column; gap: 8px; margin-top: 22px; }
  .starter-btn {
    padding: 11px 18px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); cursor: pointer; font-size: 13px;
    font-family: 'DM Sans', sans-serif; color: var(--text2); text-align: left;
    transition: all 0.15s; line-height: 1.5;
  }
  .starter-btn:hover { background: var(--bg2); color: var(--text); border-color: rgba(74,107,90,0.35); }

  /* ── INPUT ── */
  #input-area {
    padding: 14px 24px 18px;
    background: var(--surface); border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  #user-input {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--bg); color: var(--text); outline: none;
    line-height: 1.55; max-height: 130px; min-height: 44px;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: rgba(74,107,90,0.5); }
  #user-input::placeholder { color: var(--text3); }
  #send-btn {
    width: 42px; height: 42px; border-radius: 11px; background: var(--accent);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; color: white;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent-hover); transform: scale(1.06); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text3); margin-top: 7px; text-align: center; }

  /* ── RIGHT PANEL ── */
  #right-panel {
    width: 215px; min-width: 215px;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 18px; gap: 22px; overflow-y: auto;
  }
  #right-panel::-webkit-scrollbar { width: 3px; }
  #right-panel::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  .rp-section-title {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px;
  }
  .memory-item {
    font-size: 12px; color: var(--text2); line-height: 1.55;
    padding: 8px 10px; background: var(--bg2); border-radius: 8px;
    border-left: 2px solid var(--bg3); margin-bottom: 6px;
    transition: border-color 0.3s;
  }
  .memory-item.fresh { border-left-color: var(--accent); }
  .empty-note { font-size: 12px; color: var(--text3); font-style: italic; }

  .streak-num { font-family: 'Lora', serif; font-size: 34px; color: var(--accent); font-weight: 500; line-height: 1; }
  .streak-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .mood-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); padding: 3px 0; }
  .mood-row .mood-date { color: var(--text3); }

  .clear-btn {
    margin-top: auto;
    width: 100%; padding: 9px; border: 1px solid var(--border); border-radius: 8px;
    background: none; cursor: pointer; font-size: 12px; color: var(--text3);
    font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .clear-btn:hover { background: rgba(196,99,74,0.07); color: var(--coral); border-color: rgba(196,99,74,0.3); }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="app-name">Your Space</div>
      <div class="app-sub">CBT Companion · Jackson</div>
    </div>

    <div class="sidebar-section">Specialists</div>

    <button class="bot-btn active" data-bot="orchestrator" onclick="switchBot('orchestrator')">
      <div class="bot-dot" style="background:#4a6b5a"></div>
      <div class="bot-btn-text">
        <span class="bot-btn-name">Main</span>
        <span class="bot-btn-role">Your guide</span>
      </div>
    </button>
    <button class="bot-btn" data-bot="thought" onclick="switchBot('thought')">
      <div class="bot-dot" style="background:#5b8c7a"></div>
      <div class="bot-btn-text">
        <span class="bot-btn-name">Thought work</span>
        <span class="bot-btn-role">Restructuring</span>
      </div>
    </button>
    <button class="bot-btn" data-bot="anxiety" onclick="switchBot('anxiety')">
      <div class="bot-dot" style="background:#c4634a"></div>
      <div class="bot-btn-text">
        <span class="bot-btn-name">Anxiety</span>
        <span class="bot-btn-role">Worry management</span>
      </div>
    </button>
    <button class="bot-btn" data-bot="activation" onclick="switchBot('activation')">
      <div class="bot-dot" style="background:#c49a3a"></div>
      <div class="bot-btn-text">
        <span class="bot-btn-name">Activation</span>
        <span class="bot-btn-role">Motivation</span>
      </div>
    </button>

    <div class="sidebar-footer">
      <div class="mood-label">Today's mood</div>
      <div class="mood-strip">
        <button class="mood-btn" onclick="logMood(this,1)" title="Rough">😔</button>
        <button class="mood-btn" onclick="logMood(this,2)" title="Okay">😐</button>
        <button class="mood-btn" onclick="logMood(this,3)" title="Good">🙂</button>
        <button class="mood-btn" onclick="logMood(this,4)" title="Great">😊</button>
      </div>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div id="main">
    <div id="chat-header">
      <div class="header-dot" id="header-dot" style="background:#4a6b5a"></div>
      <div>
        <div class="header-name" id="header-name">Main</div>
        <div class="header-desc" id="header-desc">Your guide</div>
      </div>
      <div class="mode-badge" id="mode-badge">Ready</div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Talk to me, Jackson..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div>
      <div class="rp-section-title">Session memory</div>
      <div id="memory-list"><div class="empty-note">Nothing noted yet.</div></div>
    </div>
    <div>
      <div class="rp-section-title">Streak</div>
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-lbl">days in a row</div>
    </div>
    <div>
      <div class="rp-section-title">Mood history</div>
      <div id="mood-history"><div class="empty-note">No entries yet.</div></div>
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear all history</button>
  </div>

</div>

<script>
// ── BOT CONFIGS ──────────────────────────────────────────────────────────────
const BOTS = {
  orchestrator: {
    name: 'Main', desc: 'Your guide', color: '#4a6b5a', initial: 'M',
    system: `You are Jackson's personal CBT companion. Jackson is the only person who uses this app. His name is Jackson.

PERSONALITY: Warm, calm, and utterly unshakeable. You are the steady presence in the room. No matter what Jackson brings — a breakdown, dark thoughts, frustration, or just a boring day — you don't flinch, don't get clinical and cold, and don't panic. You speak like a real, perceptive person, not a chatbot.

TONE: Conversational and warm. Use natural language, contractions, and short sentences when the moment calls for it. Never use bullet points or numbered lists — write in flowing natural prose like a human would speak. Don't start responses with "Absolutely!", "Of course!", "Great question!", or hollow affirmations.

THREE MODES — shift between them fluidly based on what Jackson needs:
1. THERAPIST MODE: Structured CBT work. Thought records, cognitive restructuring, worry management, behavioral activation. Rigorous but warm.
2. SUPPORT MODE: Just being present. Validate. Reflect. Don't push advice or silver linings. Sit with Jackson in hard feelings.
3. FRIEND MODE: Casual, warm, even a little funny if the moment calls for it. A good honest conversation.

CRITICAL RULE — THE CHECK-IN: When Jackson shares something difficult WITHOUT explicitly asking for CBT help, ALWAYS gently check in before switching modes. Say something like "Do you want to just talk this through, or would it help to actually work through it together?" Never assume he wants a structured exercise.

MOOD AWARENESS: You will be given Jackson's memory and mood history. If his tone seems quieter, sharper, or more withdrawn than usual, gently notice it. Something like "You seem a little quieter than usual today — how are you actually doing?" Don't make a big deal of it, just notice.

SPECIALIST ROUTING: When appropriate, suggest a specialist — but always ask first:
- Thought work: for rumination, self-critical thoughts, cognitive distortions
- Anxiety: for worry, fear, anxious spiraling
- Activation: for low motivation, avoidance, depression-related inactivity

MEMORY: Use Jackson's history. Reference things he's mentioned before. Don't make him repeat himself.

NEVER: Use clinical jargon without explaining it. Give unsolicited advice when he's venting. Be chipper or performatively positive.`
  },
  thought: {
    name: 'Thought work', desc: 'Cognitive restructuring', color: '#5b8c7a', initial: 'T',
    system: `You are Jackson's Thought Challenger — a CBT specialist in cognitive restructuring and thought records. Jackson is the only user.

PERSONALITY: Warm, calm, deeply curious. You're the one Jackson comes to when his mind is being unkind. You ask questions that help him see things differently — you never tell him what to think.

YOUR SPECIALTY — the CBT thought record, done warmly and one step at a time:
1. Situation — what happened, just the facts
2. Automatic thought — the exact thought that came, verbatim if possible
3. Emotion & intensity — what he felt and how strong (0-100)
4. Cognitive distortions — gently name what you notice: all-or-nothing thinking, catastrophizing, mind-reading, fortune-telling, personalization, should statements, etc. Name them without being clinical.
5. Evidence for and against the thought — explore both sides honestly
6. Balanced thought — a more accurate, compassionate alternative
7. Re-rate the emotion — how does he feel now?

APPROACH: Never rush. One step at a time. If he's not ready for a full thought record, just explore the thought conversationally. The structure serves him, not the other way around. Always check what he needs before starting.

TONE: Natural flowing prose. No bullet points. Warm and genuinely curious.

PATTERNS: If you notice a recurring pattern (e.g. catastrophizing about work, self-criticism), gently name it with warmth — "this sounds a bit like that pattern we've talked about before."`
  },
  anxiety: {
    name: 'Anxiety', desc: 'Worry management', color: '#c4634a', initial: 'A',
    system: `You are Jackson's Anxiety Coach — a CBT specialist in worry management, anxiety, and fear-based thinking. Jackson is the only user.

PERSONALITY: Warm, grounding, and steady. When Jackson is anxious or spiraling, you are the anchor. You never minimize ("it's not that bad") and never amplify. You help him find solid ground.

YOUR TOOLKIT — use the right tool for the moment:

WORRY TREE: Is this worry actionable right now? If yes, help him make a small concrete plan. If no, move to worry postponement.

WORRY POSTPONEMENT: "Let's put that worry in a box for now and agree to come back to it at a set time. You don't have to solve it right this moment."

GROUNDING (5-4-3-2-1): For acute anxiety — 5 things you can see, 4 you can touch, 3 you can hear, 2 you can smell, 1 you can taste.

DECATASTROPHIZING: Walk gently through "what's the worst that could realistically happen? And if it did — could you handle it?"

EXPOSURE AWARENESS: If avoidance is a pattern, gently name it and explore one small step toward the feared situation.

APPROACH: Never launch straight into a technique. First, meet him where he is. "That sounds really overwhelming. Tell me what's going on." Then offer a tool only if it would help — and ask first.

TONE: Natural flowing prose. No lists or clinical terms without explanation. Grounding and present.`
  },
  activation: {
    name: 'Activation', desc: 'Motivation & behavior', color: '#c49a3a', initial: 'AC',
    system: `You are Jackson's Activation Coach — a CBT specialist in behavioral activation, motivation, and breaking avoidance patterns. Jackson is the only user.

PERSONALITY: Warm and encouraging without being a cheerleader. You understand that telling someone with low motivation to "just do it" is useless and annoying. You meet Jackson where he is. Your goal: help him take one small step, not climb a mountain.

YOUR TOOLKIT:

ACTIVITY SCHEDULING: Help identify small, meaningful activities that connect to Jackson's values. Not a packed schedule — one or two things that genuinely matter.

MOOD-ACTIVITY CONNECTION: "Let's look at what was happening before you started feeling this way. What were you doing? What had you been avoiding?" Help him see the link between behavior and mood.

VALUES CLARIFICATION: When he's stuck, explore what matters — "Is there something that used to feel meaningful that you haven't done in a while?"

GRADED TASK ASSIGNMENT: Break an overwhelming task into the smallest possible first step. "You don't have to finish it. What's just the first five minutes?"

AVOIDANCE PATTERNS: Name avoidance kindly — "It sounds like that's been getting pushed back a lot. What do you think gets in the way?"

APPROACH: Always compassionate about low motivation — never shame it. Acknowledge how depleted he might be feeling. Then find the smallest door in.

TONE: Natural prose. Warm. No lists. No productivity-bro energy.`
  }
};

// ── STATE ────────────────────────────────────────────────────────────────────
let currentBot = 'orchestrator';
let conversations = { orchestrator: [], thought: [], anxiety: [], activation: [] };
let memories = [];
let moodLog = [];
let streak = 0;
let isLoading = false;

// ── STORAGE ──────────────────────────────────────────────────────────────────
function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function loadAll() {
  memories = storageGet('jcbt_memories') || [];
  moodLog  = storageGet('jcbt_moods')   || [];
  streak   = storageGet('jcbt_streak')  || 0;

  // streak logic
  const today = new Date().toDateString();
  const lastDay = storageGet('jcbt_last_day');
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDay !== today) {
    if (lastDay === yesterday) streak++;
    else if (lastDay !== today) streak = 1;
    storageSet('jcbt_last_day', today);
    storageSet('jcbt_streak', streak);
  }

  // restore today's mood btn
  const todayMood = moodLog.find(m => new Date(m.date).toDateString() === today);
  if (todayMood) {
    const btns = document.querySelectorAll('.mood-btn');
    if (btns[todayMood.score - 1]) btns[todayMood.score - 1].classList.add('selected');
  }

  document.getElementById('streak-num').textContent = streak;
  renderMemories();
  renderMoodHistory();
  renderMessages();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderMessages() {
  const el = document.getElementById('messages');
  const conv = conversations[currentBot];
  if (!conv.length) {
    el.innerHTML = `<div class="welcome-wrap">
      <h2>Hey, Jackson.</h2>
      <p>This is your space. You can work through something, vent, do a proper CBT session, or just talk. I'll follow your lead.</p>
      <div class="welcome-starters">
        <button class="starter-btn" onclick="sendStarter(this.textContent)">I want to work through something that's been on my mind</button>
        <button class="starter-btn" onclick="sendStarter(this.textContent)">I've been feeling anxious lately</button>
        <button class="starter-btn" onclick="sendStarter(this.textContent)">I'm struggling to stay motivated</button>
        <button class="starter-btn" onclick="sendStarter(this.textContent)">I just need to talk</button>
      </div>
    </div>`;
    return;
  }
  el.innerHTML = conv.map(msgHTML).join('');
  el.scrollTop = el.scrollHeight;
}

function msgHTML(m) {
  const cfg = BOTS[currentBot];
  if (m.type === 'mode-check') {
    return `<div class="mode-check-wrap">
      <div class="mode-check-text">${m.content}</div>
      <div class="mode-check-btns">
        <button class="mode-check-btn" onclick="respondMode('support')">Just talk</button>
        <button class="mode-check-btn" onclick="respondMode('therapist')">Work through it</button>
        <button class="mode-check-btn" onclick="respondMode('friend')">Something else</button>
      </div>
    </div>`;
  }
  const isUser = m.role === 'user';
  const avatar = `<div class="msg-avatar" style="background:${isUser ? '#9a948c' : cfg.color}">${isUser ? 'J' : cfg.initial}</div>`;
  const bubble = `<div class="msg-bubble">${m.content.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')}</div>`;
  return `<div class="msg ${isUser ? 'user' : 'assistant'}">${avatar}${bubble}</div>`;
}

function renderMemories() {
  const el = document.getElementById('memory-list');
  if (!memories.length) { el.innerHTML = '<div class="empty-note">Nothing noted yet.</div>'; return; }
  el.innerHTML = memories.slice(-8).reverse().map((m, i) =>
    `<div class="memory-item ${i === 0 ? 'fresh' : ''}">${m}</div>`
  ).join('');
}

function renderMoodHistory() {
  const el = document.getElementById('mood-history');
  if (!moodLog.length) { el.innerHTML = '<div class="empty-note">No entries yet.</div>'; return; }
  const icons = {1:'😔',2:'😐',3:'🙂',4:'😊'};
  el.innerHTML = moodLog.slice(-7).reverse().map(m =>
    `<div class="mood-row">
      <span>${icons[m.score]}</span>
      <span class="mood-date">${new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
    </div>`
  ).join('');
}

// ── BOT SWITCHING ────────────────────────────────────────────────────────────
function switchBot(bot) {
  currentBot = bot;
  const cfg = BOTS[bot];
  document.querySelectorAll('.bot-btn').forEach(b => b.classList.toggle('active', b.dataset.bot === bot));
  document.getElementById('header-dot').style.background = cfg.color;
  document.getElementById('header-name').textContent = cfg.name;
  document.getElementById('header-desc').textContent = cfg.desc;
  const badge = document.getElementById('mode-badge');
  badge.textContent = 'Ready'; badge.className = 'mode-badge';
  renderMessages();
}

function updateModeBadge(text) {
  const badge = document.getElementById('mode-badge');
  const lower = text.toLowerCase();
  let mode = '';
  if (lower.includes('thought record') || lower.includes('let\'s look at') || lower.includes('step') || lower.includes('work through')) mode = 'therapist';
  else if (lower.includes('i hear you') || lower.includes('that sounds') || lower.includes('sit with') || lower.includes('makes sense that')) mode = 'support';
  else if (lower.includes('honestly') || lower.includes('yeah,') || lower.includes('right?')) mode = 'friend';
  if (mode) { badge.textContent = mode; badge.className = 'mode-badge ' + mode; }
}

// ── MOOD LOGGING ─────────────────────────────────────────────────────────────
function logMood(btn, score) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const today = new Date().toDateString();
  const idx = moodLog.findIndex(m => new Date(m.date).toDateString() === today);
  if (idx >= 0) moodLog[idx].score = score;
  else moodLog.push({ score, date: Date.now() });
  storageSet('jcbt_moods', moodLog);
  renderMoodHistory();
}

// ── MEMORY EXTRACTION ─────────────────────────────────────────────────────────
async function extractMemories(userMsg, botReply) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: `You extract short memory notes from therapy conversations for a CBT app. The user is Jackson.
Extract 0-2 things worth remembering long-term: recurring thought patterns, triggers, things that help, values, significant events.
Return ONLY a JSON array of short strings under 12 words each. Example: ["Catastrophizes about work deadlines","Running lifts his mood"]
If nothing worth saving: []
Be selective — only save genuinely useful cross-session insights.`,
        messages: [{ role: 'user', content: `User: "${userMsg}"\nBot: "${botReply}"` }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text?.trim().replace(/```json|```/g,'').trim() || '[]';
    const extracted = JSON.parse(raw);
    if (Array.isArray(extracted) && extracted.length) {
      memories.push(...extracted);
      if (memories.length > 40) memories = memories.slice(-40);
      storageSet('jcbt_memories', memories);
      renderMemories();
    }
  } catch(e) {}
}

// ── API CALL ──────────────────────────────────────────────────────────────────
function buildContext() {
  let ctx = '';
  if (memories.length || moodLog.length) {
    ctx += '\n\nJACKSON\'S MEMORY & HISTORY:';
    if (memories.length) ctx += '\nKey things to remember:\n' + memories.map(m => `- ${m}`).join('\n');
    if (moodLog.length) {
      const icons = {1:'rough',2:'okay',3:'good',4:'great'};
      const recent = moodLog.slice(-7).map(m =>
        `${new Date(m.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}: ${icons[m.score]}`
      ).join(', ');
      ctx += '\nRecent mood: ' + recent;
    }
  }
  return ctx;
}

async function callAPI(userText) {
  const bot = BOTS[currentBot];
  const systemPrompt = bot.system + buildContext();
  const apiMsgs = conversations[currentBot]
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-20)
    .map(m => ({ role: m.role, content: m.content }));

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: apiMsgs
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || 'Something went wrong.';
}

// ── MESSAGING ─────────────────────────────────────────────────────────────────
function addMsg(role, content, type) {
  conversations[currentBot].push({ role, content, type: type || role });
  renderMessages();
}

function showTyping() {
  const cfg = BOTS[currentBot];
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-wrap'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar" style="background:${cfg.color};width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:white;flex-shrink:0">${cfg.initial}</div>
    <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage(overrideText) {
  const input = document.getElementById('user-input');
  const text = (overrideText !== undefined ? overrideText : input.value).trim();
  if (!text || isLoading) return;
  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMsg('user', text);
  showTyping();

  try {
    const reply = await callAPI(text);
    removeTyping();
    addMsg('assistant', reply);
    updateModeBadge(reply);
    extractMemories(text, reply);
  } catch(e) {
    removeTyping();
    addMsg('assistant', "I'm having a little trouble connecting right now. Check your internet and try again in a moment.");
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function sendStarter(text) {
  conversations[currentBot] = [];
  sendMessage(text);
}

function respondMode(mode) {
  const labels = {
    support: "I just need to talk right now.",
    therapist: "Yeah, I'd like to actually work through it.",
    friend: "Just chat with me for a bit."
  };
  conversations[currentBot] = conversations[currentBot].filter(m => m.type !== 'mode-check');
  sendMessage(labels[mode]);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function clearAll() {
  if (!confirm('Clear all memory, mood history, and conversations for Jackson? This cannot be undone.')) return;
  memories = []; moodLog = []; streak = 0;
  conversations = { orchestrator: [], thought: [], anxiety: [], activation: [] };
  ['jcbt_memories','jcbt_moods','jcbt_streak','jcbt_last_day'].forEach(k => localStorage.removeItem(k));
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('streak-num').textContent = '0';
  renderMemories(); renderMoodHistory(); renderMessages();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
